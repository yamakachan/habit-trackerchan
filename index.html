<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Habit &amp; Task</title>
<style>
:root{
  --paper:#FBFBF9;
  --ink:#3A3A3A;
  --ink-light:#8A8A88;
  --ink-faint:#C8C8C5;
  --sun:#D96B6B;
  --sat:#6B96C7;
  --accent:#007394;
  --accent-soft:rgba(0,115,148,.12);
  /* パステル(タスク色用) */
  --c-primary:#B5D8E0;
  --c-accent:#FAD4A8;
  --c-warm:#F5C8C8;
  --c-cool:#D4D9E8;
  --c-neutral:#E5DFD0;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:"Hiragino Mincho ProN","YuMincho","游明朝",-apple-system,sans-serif;
  background:#F0EEE9; /* 卓上の影色 */
  color:var(--ink);
  min-height:100vh;
  padding:24px 12px;
}
.book{
  max-width:1100px;margin:0 auto;background:var(--paper);
  box-shadow:0 8px 32px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
  border-radius:6px;
  position:relative;
  padding:36px 44px 28px;
}
/* タイトル */
.title-block{text-align:center;margin:0 0 18px;position:relative}
.title-block .tagline{
  display:block;font-size:11px;color:var(--accent);
  letter-spacing:4px;margin-bottom:8px;
}
.title-block .month-num{
  font-family:"Didot","Bodoni 72","Hiragino Mincho ProN",serif;
  font-size:64px;font-weight:400;line-height:1;color:var(--ink);
  letter-spacing:-2px;
}
.title-block .year{
  display:block;font-size:11px;color:var(--ink-light);
  letter-spacing:6px;margin-top:6px;
}
/* コントロール */
.controls{
  display:flex;justify-content:center;gap:8px;margin-bottom:18px;
}
.controls button{
  background:transparent;border:1px solid var(--ink-faint);
  color:var(--ink-light);padding:4px 14px;border-radius:14px;cursor:pointer;
  font-size:11px;letter-spacing:1px;font-family:inherit;
  transition:all .15s ease;
}
.controls button:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.controls .nav{padding:4px 10px;font-size:14px}

/* メインレイアウト */
main{display:grid;grid-template-columns:1fr 280px;gap:32px}
@media (max-width:820px){main{grid-template-columns:1fr}}

/* 曜日ヘッダー */
.weekday-row{
  display:grid;grid-template-columns:repeat(7,1fr);text-align:center;
  font-size:10px;letter-spacing:2px;color:var(--ink-light);
  padding:8px 0;border-bottom:1px solid var(--ink-faint);
}
.weekday-row .sun{color:var(--sun)}
.weekday-row .sat{color:var(--sat)}

/* カレンダーグリッド */
.calendar{display:grid;grid-template-columns:repeat(7,1fr)}
.cell{
  min-height:100px;padding:6px 4px 4px;cursor:pointer;
  display:flex;flex-direction:column;gap:2px;
  border-right:1px dashed transparent;
  position:relative;
  transition:background .15s ease;
}
.cell:hover{background:rgba(0,0,0,.02)}
.cell.empty{cursor:default;color:var(--ink-faint)}
.cell.empty:hover{background:transparent}
.cell .d{
  font-size:13px;color:var(--ink);text-align:center;
  font-family:"Didot","Bodoni 72",serif;font-weight:400;
}
.cell.empty .d{color:var(--ink-faint)}
.cell.sun .d{color:var(--sun)}
.cell.sat .d{color:var(--sat)}
.cell.today .d{
  position:relative;display:inline-block;margin:0 auto;
  color:var(--accent);font-weight:700;
}
.cell.today .d::after{
  content:"";position:absolute;left:-3px;right:-3px;bottom:-3px;
  height:1px;background:var(--accent);
}
.cell.selected{background:var(--accent-soft)}
.stickers{
  display:flex;flex-wrap:wrap;gap:2px;justify-content:center;
  margin-top:auto;padding-top:2px;
}
.sticker{
  display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;font-size:16px;cursor:pointer;line-height:1;
  transition:transform .12s ease;
  box-shadow:0 1px 2px rgba(0,0,0,.06);
}
.sticker:hover{transform:scale(1.2)}
.sticker.habit{border-radius:50%}
.sticker.project{border-radius:5px;padding:0 6px;width:auto;font-size:13px;gap:3px}
.sticker .pct{font-size:10px;opacity:.8;margin-left:1px}
/* 画像シール */
.sticker.has-img{padding:0;background:transparent !important;overflow:hidden}
.sticker.has-img img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit}
.sticker.project.has-img{width:auto;display:inline-flex;padding:0 5px 0 0;background:#fff !important;gap:4px}
.sticker.project.has-img img{width:30px;height:30px;border-radius:5px}
/* 色バリエーション */
.sticker.c-primary{background:var(--c-primary);color:#1F4A55}
.sticker.c-accent{background:var(--c-accent);color:#7A4A1A}
.sticker.c-warm{background:var(--c-warm);color:#7A3535}
.sticker.c-cool{background:var(--c-cool);color:#3A4470}
.sticker.c-neutral{background:var(--c-neutral);color:#5A4F2A}
/* 詳細パネルの画像 */
.task-row .info .ti-img{
  width:36px;height:36px;border-radius:50%;object-fit:cover;
  vertical-align:middle;margin-right:10px;
}

/* ミニカレンダー & CSVボタン */
.mini-row{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-top:18px;padding-top:14px;border-top:1px solid var(--ink-faint);
  gap:24px;
}
.mini-list{display:flex;gap:24px}
.csv-btn{
  background:transparent;border:1px solid var(--ink-faint);
  color:var(--ink-light);padding:5px 14px;border-radius:14px;cursor:pointer;
  font-size:10px;letter-spacing:1.5px;font-family:inherit;
  transition:all .15s ease;align-self:flex-end;
}
.csv-btn:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.mini{font-size:9px}
.mini .mini-title{
  text-align:center;color:var(--ink-light);margin-bottom:4px;letter-spacing:1px;
  font-family:"Didot",serif;
}
.mini-grid{
  display:grid;grid-template-columns:repeat(7,16px);gap:0;
  font-family:"Didot",serif;
}
.mini-grid .h{color:var(--ink-light);font-size:8px;text-align:center;padding:1px 0}
.mini-grid .h.sun{color:var(--sun)}
.mini-grid .h.sat{color:var(--sat)}
.mini-grid .d{text-align:center;padding:1px 0;color:var(--ink)}
.mini-grid .d.sun{color:var(--sun)}
.mini-grid .d.sat{color:var(--sat)}
.mini-grid .d.empty{color:transparent}

/* 詳細パネル */
.detail{
  background:var(--paper);padding:18px 16px;
  border-left:1px solid var(--ink-faint);
  height:fit-content;
}
.detail h3{
  margin:0 0 14px;font-size:13px;color:var(--ink-light);
  letter-spacing:2px;font-weight:400;
  font-family:"Didot",serif;text-align:center;
  padding-bottom:8px;border-bottom:1px solid var(--ink-faint);
}
.task-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 0;border-bottom:1px dotted var(--ink-faint);gap:10px;
}
.task-row:last-child{border-bottom:none}
.task-row .info{flex:1;min-width:0}
.task-row a{color:var(--ink);text-decoration:none;font-size:13px}
.task-row a:hover{color:var(--accent)}
.task-row .meta{color:var(--ink-light);font-size:10px;margin-top:2px;letter-spacing:.5px}
.toggle{
  cursor:pointer;background:var(--paper);
  border:1.5px solid var(--ink-faint);width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s ease;padding:0;
}
.toggle:hover{border-color:var(--accent)}
.toggle.on{background:var(--accent);border-color:var(--accent)}
.toggle.on::after{content:"✓";color:#fff;font-size:12px;font-weight:bold}

/* 月次達成率サマリー */
.monthly{
  margin-top:18px;padding-top:14px;border-top:1px solid var(--ink-faint);
}
.monthly-title{
  font-size:11px;color:var(--ink-light);letter-spacing:2px;
  font-family:"Didot",serif;text-align:center;margin-bottom:10px;
}
.stat-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;font-size:11px;
}
.stat-name{color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}
.stat-name .stat-icon{font-size:6px;color:var(--ink-light);margin-right:4px;vertical-align:middle;opacity:.6}
.stat-bar{
  width:80px;height:6px;background:#EAE6DD;border:1px solid var(--ink-faint);
  border-radius:3px;overflow:hidden;margin:0 8px;flex-shrink:0;flex-grow:0;
  box-sizing:border-box;
}
.stat-bar-fill{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width .3s ease;
}
.stat-num{color:var(--ink-light);font-family:"Didot",serif;font-size:11px;flex-shrink:0;letter-spacing:.5px}
.stat-pct{color:var(--accent);font-weight:600;margin-left:6px;font-size:10px}

/* Toast & loading */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:rgba(40,40,40,.92);color:#fff;
  padding:9px 18px;border-radius:20px;font-size:12px;
  opacity:0;transition:opacity .2s;z-index:100;
}
.toast.show{opacity:1}
.loading{text-align:center;color:var(--ink-light);padding:20px;font-size:11px;letter-spacing:1px}
</style>
</head>
<body>
<div class="book">
  <div class="title-block">
    <span class="month-num" id="monthNum">4</span>
    <span class="year" id="yearLabel">2026</span>
  </div>

  <div class="controls">
    <button class="nav" id="prev">‹</button>
    <button id="today">ᴛᴏᴅᴀʏ</button>
    <button class="nav" id="next">›</button>
  </div>

  <main>
    <section>
      <div class="weekday-row">
        <div class="sun">ꜱᴜɴ</div><div>ᴍᴏɴ</div><div>ᴛᴜᴇ</div><div>ᴡᴇᴅ</div><div>ᴛʜᴜ</div><div>ꜰʀɪ</div><div class="sat">ꜱᴀᴛ</div>
      </div>
      <div class="calendar" id="cal"></div>
      <div class="mini-row">
        <button id="csv" class="csv-btn" title="今月分をCSV書き出し">⬇ ᴄꜱᴠ</button>
        <div class="mini-list" id="miniRow"></div>
      </div>
    </section>
    <aside class="detail" id="detail"><div class="loading">読み込み中…</div></aside>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// ⬇⬇⬇ ここを自分の GAS Web App URL に書き換えてください ⬇⬇⬇
//   (例) const GAS_URL = 'https://script.google.com/macros/s/ABC.../exec';
// ============================================================
const GAS_URL = '<<ここにGAS-URLを貼り付け>>';

const COLOR_CLASSES = ['primary','accent','warm','cool','neutral'];
const state = { ym: ymToday(), selected: null, tasks: [], logs: [] };

function ymToday(){ const d=new Date(); return d.getFullYear()+'-'+pad2(d.getMonth()+1); }
function pad2(n){ return String(n).padStart(2,'0'); }
function isoDate(y,m,d){ return y+'-'+pad2(m)+'-'+pad2(d); }
function isoToday(){ const d=new Date(); return isoDate(d.getFullYear(), d.getMonth()+1, d.getDate()); }
function shiftYM(ym, delta){
  const parts = ym.split('-').map(Number);
  const d = new Date(parts[0], parts[1]-1+delta, 1);
  return d.getFullYear()+'-'+pad2(d.getMonth()+1);
}
function colorClass(name){
  return 'c-' + (COLOR_CLASSES.indexOf(name) >= 0 ? name : 'primary');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

async function loadMonth(ym){
  try{
    const res = await fetch(GAS_URL + '?month=' + ym, { method:'GET' }).then(r=>r.json());
    if (!res.ok) { showToast('読み込み失敗: ' + res.error); return; }
    state.ym = ym;
    state.tasks = res.tasks || [];
    state.logs  = res.logs  || [];
    if (!state.selected) state.selected = isoToday();
    render();
  }catch(err){
    showToast('通信エラー: ' + err.message);
  }
}

async function postGAS(body){
  const res = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body)
  });
  return res.json();
}

function render(){
  const parts = state.ym.split('-').map(Number);
  const y = parts[0], m = parts[1];
  document.getElementById('monthNum').textContent = m;
  document.getElementById('yearLabel').textContent = y;

  const startDow = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  for (let i=0; i<startDow; i++){
    const e = document.createElement('div');
    e.className = 'cell empty';
    cal.appendChild(e);
  }
  for (let d=1; d<=days; d++) cal.appendChild(dayCell(y, m, d));
  const total = startDow + days;
  const tail = (Math.ceil(total/7)*7) - total;
  for (let i=0; i<tail; i++){
    const e = document.createElement('div');
    e.className = 'cell empty';
    cal.appendChild(e);
  }
  renderMini(y, m);
  renderDetail();
}

function dayCell(y, m, d){
  const dateISO = isoDate(y, m, d);
  const cell = document.createElement('div');
  cell.className = 'cell';
  const dow = new Date(y, m-1, d).getDay();
  if (dow === 0) cell.classList.add('sun');
  if (dow === 6) cell.classList.add('sat');
  if (dateISO === isoToday()) cell.classList.add('today');
  if (dateISO === state.selected) cell.classList.add('selected');

  const dLabel = document.createElement('div');
  dLabel.className = 'd';
  dLabel.textContent = d;
  cell.appendChild(dLabel);

  const wrap = document.createElement('div');
  wrap.className = 'stickers';
  state.logs.filter(l => l.date === dateISO).forEach(l => {
    const t = state.tasks.find(t => t.id === l.taskId);
    if (!t) return;
    const s = document.createElement('span');
    const hasImg = !!t.image;
    s.className = 'sticker '
      + (t.type === 'project' ? 'project' : 'habit') + ' '
      + colorClass(t.color)
      + (hasImg ? ' has-img' : '');
    if (hasImg){
      const img = document.createElement('img');
      img.src = t.image; img.alt = t.name;
      img.onerror = () => { s.classList.remove('has-img'); s.textContent = t.icon || '●'; };
      s.appendChild(img);
      if (t.type === 'project'){
        const pct = document.createElement('span');
        pct.className = 'pct'; pct.textContent = (t.progress|0);
        s.appendChild(pct);
      }
    } else if (t.type === 'project'){
      s.innerHTML = (t.icon || '◆') + '<span class="pct">' + (t.progress|0) + '</span>';
    } else {
      s.textContent = t.icon || '●';
    }
    s.title = t.name + ' (' + dateISO + ')';
    s.onclick = (ev) => {
      ev.stopPropagation();
      if (l.id && !String(l.id).startsWith('tmp')){
        const logUrl = 'https://www.notion.so/' + String(l.id).replace(/-/g,'');
        window.open(logUrl, '_blank', 'noopener');
      } else {
        // 楽観的更新直後でログIDがまだ仮の場合はタスクページへフォールバック
        window.open(t.url, '_blank', 'noopener');
      }
    };
    wrap.appendChild(s);
  });
  cell.appendChild(wrap);

  cell.onclick = () => { state.selected = dateISO; render(); };
  return cell;
}

function renderMini(y, m){
  const row = document.getElementById('miniRow');
  row.innerHTML = '';
  // 前月
  const prev = shiftYM(state.ym, -1).split('-').map(Number);
  row.appendChild(buildMini(prev[0], prev[1]));
  // 翌月
  const next = shiftYM(state.ym, +1).split('-').map(Number);
  row.appendChild(buildMini(next[0], next[1]));
}

function buildMini(y, m){
  const wrap = document.createElement('div');
  wrap.className = 'mini';
  const title = document.createElement('div');
  title.className = 'mini-title';
  title.textContent = y + ' / ' + m;
  wrap.appendChild(title);
  const grid = document.createElement('div');
  grid.className = 'mini-grid';
  const heads = ['ꜱ','ᴍ','ᴛ','ᴡ','ᴛ','ꜰ','ꜱ'];
  heads.forEach((h,i)=>{
    const c = document.createElement('div');
    c.className = 'h' + (i===0?' sun':'') + (i===6?' sat':'');
    c.textContent = h;
    grid.appendChild(c);
  });
  const startDow = new Date(y, m-1, 1).getDay();
  const days = new Date(y, m, 0).getDate();
  for (let i=0; i<startDow; i++){
    const c = document.createElement('div');
    c.className = 'd empty'; c.textContent = '0';
    grid.appendChild(c);
  }
  for (let d=1; d<=days; d++){
    const c = document.createElement('div');
    const dow = new Date(y, m-1, d).getDay();
    c.className = 'd' + (dow===0?' sun':'') + (dow===6?' sat':'');
    c.textContent = d;
    grid.appendChild(c);
  }
  wrap.appendChild(grid);
  return wrap;
}

function renderDetail(){
  const el = document.getElementById('detail');
  const date = state.selected || isoToday();
  el.innerHTML = '';
  const h = document.createElement('h3');
  h.textContent = date.replace(/-/g,'.');
  el.appendChild(h);

  if (!state.tasks.length){
    const p = document.createElement('div');
    p.className = 'loading';
    p.textContent = 'Tasks DB にタスクを追加してください';
    el.appendChild(p);
    return;
  }

  state.tasks.forEach(t => {
    const log = state.logs.find(l => l.date === date && l.taskId === t.id);
    const done = !!log;
    const row = document.createElement('div');
    row.className = 'task-row';

    const info = document.createElement('div');
    info.className = 'info';
    const a = document.createElement('a');
    a.href = t.url; a.target = '_blank'; a.rel = 'noopener';
    if (t.image){
      const im = document.createElement('img');
      im.className = 'ti-img'; im.src = t.image; im.alt = '';
      im.onerror = () => im.remove();
      a.appendChild(im);
      a.appendChild(document.createTextNode(t.name));
    } else {
      a.textContent = (t.icon || '●') + ' ' + t.name;
    }
    info.appendChild(a);
    if (t.type === 'project'){
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = '進捗 ' + (t.progress|0) + '%' + (t.due ? '  期限 ' + t.due : '');
      info.appendChild(meta);
    } else if (t.frequency){
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = t.frequency;
      info.appendChild(meta);
    }
    row.appendChild(info);

    const btn = document.createElement('button');
    btn.className = 'toggle' + (done ? ' on' : '');
    btn.title = done ? 'シールを外す' : 'シールを貼る';
    btn.onclick = () => toggleSticker(t, date, done);
    row.appendChild(btn);

    el.appendChild(row);
  });

  renderMonthlyStats(el);
}

function renderMonthlyStats(el){
  const parts = state.ym.split('-').map(Number);
  const y = parts[0], m = parts[1];
  const totalDays = new Date(y, m, 0).getDate();

  const wrap = document.createElement('div');
  wrap.className = 'monthly';
  const title = document.createElement('div');
  title.className = 'monthly-title';
  title.textContent = 'ᴍᴏɴᴛʜʟʏ ᴘʀᴏɢʀᴇꜱꜱ';
  wrap.appendChild(title);

  state.tasks.forEach(t => {
    const doneCount = state.logs.filter(l => l.taskId === t.id).length;
    const pct = Math.round(doneCount / totalDays * 100);
    const row = document.createElement('div');
    row.className = 'stat-row';

    const name = document.createElement('span');
    name.className = 'stat-name';
    const ic = document.createElement('span');
    ic.className = 'stat-icon';
    ic.textContent = t.icon || '●';
    name.appendChild(ic);
    name.appendChild(document.createTextNode(t.name));
    row.appendChild(name);

    const bar = document.createElement('div');
    bar.className = 'stat-bar';
    const fill = document.createElement('div');
    fill.className = 'stat-bar-fill';
    fill.style.width = Math.min(100, pct) + '%';
    bar.appendChild(fill);
    row.appendChild(bar);

    const num = document.createElement('span');
    num.className = 'stat-num';
    num.textContent = doneCount + '/' + totalDays;
    row.appendChild(num);

    const pctEl = document.createElement('span');
    pctEl.className = 'stat-pct';
    pctEl.textContent = pct + '%';
    row.appendChild(pctEl);

    wrap.appendChild(row);
  });

  el.appendChild(wrap);
}

async function toggleSticker(task, date, currentDone){
  const next = !currentDone;
  if (next){
    state.logs.push({ id: 'tmp_' + Date.now(), date: date, taskId: task.id, done: true });
  } else {
    state.logs = state.logs.filter(l => !(l.date === date && l.taskId === task.id));
  }
  render();
  try{
    const res = await postGAS({ action:'toggleSticker', taskId: task.id, date: date, done: next });
    if (!res.ok){
      showToast('保存失敗: ' + res.error);
      await loadMonth(state.ym);
      return;
    }
    // 新規作成された Log ページの本物の ID を仮IDと差し替え（クリック遷移用）
    if (next && res.data && res.data.id){
      const tmp = state.logs.find(l => l.taskId === task.id && l.date === date && String(l.id).startsWith('tmp'));
      if (tmp) tmp.id = res.data.id;
    }
  }catch(err){
    showToast('通信エラー: ' + err.message);
    await loadMonth(state.ym);
  }
}

document.getElementById('prev').onclick  = () => loadMonth(shiftYM(state.ym, -1));
document.getElementById('next').onclick  = () => loadMonth(shiftYM(state.ym, +1));
document.getElementById('today').onclick = () => { state.selected = isoToday(); loadMonth(ymToday()); };
document.getElementById('csv').onclick   = exportCsv;

function csvEscape(v){
  v = (v == null ? '' : String(v));
  return /[,"\n\r]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
}

function isTargetDay(task, dateISO, dow){
  if (task.type === 'project'){
    if (task.start && dateISO < task.start) return 0;
    if (task.due && dateISO > task.due) return 0;
    return 1;
  }
  // habit
  switch(task.frequency){
    case 'weekdays': return (dow >= 1 && dow <= 5) ? 1 : 0;
    case 'weekends': return (dow === 0 || dow === 6) ? 1 : 0;
    default: return 1; // daily, custom, 未設定
  }
}

function exportCsv(){
  if (!state.tasks.length){ showToast('タスクが登録されていません'); return; }
  const parts = state.ym.split('-').map(Number);
  const y = parts[0], m = parts[1];
  const days = new Date(y, m, 0).getDate();
  const dowJa = ['日','月','火','水','木','金','土'];
  const header = ['日付','曜日','週番号','タスク名','種別','頻度','対象日','達成','進捗(%)','色','メモ'];
  const data = [];

  for (let d = 1; d <= days; d++){
    const dateISO = isoDate(y, m, d);
    const yyyymmdd = y + pad2(m) + pad2(d);
    const dow = new Date(y, m-1, d).getDay();
    const weekNo = Math.ceil(d / 7);
    state.tasks.forEach(t => {
      const log = state.logs.find(l => l.date === dateISO && l.taskId === t.id);
      if (!log) return; // スタンプが押された行のみ出力
      data.push([
        yyyymmdd,
        dowJa[dow],
        weekNo,
        t.name,
        t.type,
        t.frequency || '',
        isTargetDay(t, dateISO, dow),
        1,
        t.type === 'project' ? (t.progress|0) : '',
        t.color || '',
        log.note || ''
      ]);
    });
  }

  if (!data.length){ showToast('今月のシール記録がありません'); return; }

  const csv = [header, ...data].map(r => r.map(csvEscape).join(',')).join('\r\n');
  const bom = '﻿'; // Excel での文字化け防止
  const blob = new Blob([bom + csv], { type:'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'habit-tracker_' + state.ym.replace('-','') + '.csv';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  showToast('ダウンロードしました');
}

loadMonth(state.ym);
</script>
